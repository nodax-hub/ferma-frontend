services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: online-shop-frontend
    ports:
      - "7777:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: online-shop-backend
    environment:
      PROJECT_NAME: Online Shop API
      DATABASE_URL: sqlite:////app/data/app.db
      SECRET_KEY: change-me-in-local-compose
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8888:8000"
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

volumes:
  backend_data:
